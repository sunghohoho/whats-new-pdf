# ─────────────────────────────────────────────────────────────
# AWS 업데이트 리포트 데이터
# 이 파일만 수정하면 됩니다. 스타일/레이아웃은 템플릿에 고정되어 있습니다.
# ─────────────────────────────────────────────────────────────

meta:
  eyebrow: "Infrastructure Notice"
  title: "AWS 서비스 변경사항 안내"
  subtitle: "EOL · EOS 일정 및 신규 출시 서비스 요약 — 2026년 6월 기준"
  author: "MSP"
  written: "2026.07.06"
  intro: >
    최근 발표된 AWS 서비스 종료(EOL·EOS) 일정과 신규 출시 서비스를 정리하였습니다.
    현재 사용 중인 서비스가 아래 목록에 해당하는 경우 사전 마이그레이션 계획 수립을 권장드립니다.

# ─────────────────────────────────────────────────────────────
# EOL / EOS  (badge: sunset = EOL/지원종료, eos = 서비스종료/변경)
# ─────────────────────────────────────────────────────────────
eol_eos:
  - service: "Aurora MySQL"
    target: "3.05 / 3.06 / 3.07"
    date: "2026.06.30"
    action: "3.10 이상으로 자동 업그레이드"
    badge: "eol"

  - service: "Aurora Serverless PostgreSQL"
    target: "13"
    date: "2026.06.08"
    action: "ACU 시간당 확장 지원 요금이 표준 ACU 요금에 추가 청구"
    badge: "eos"

  - service: "Aurora PostgreSQL Limitless"
    target: "16.4 / 16.6"
    date: "2026.09.23"
    action: "16.11 이상으로 자동 업그레이드"
    badge: "eol"

  - service: "Lambda"
    target: ".NET 8"
    date: "2026.11.10"
    action: "런타임 EOS"
    badge: "eos"

  - service: "Amazon MSK — Apache Kafka"
    target: "3.6.0 / 3.7.x"
    date: "2026.09.08 / 09.01"
    action: "3.9.x 이상으로 자동 업그레이드"
    badge: "eol"

  - service: "Amazon EKS — Kubernetes"
    target: "1.31 확장 지원 EOL"
    date: "2026.11.26"
    action: "1.32 자동 업데이트"
    badge: "eol"

  - service: "Amazon EKS — Kubernetes"
    target: "1.34 표준 지원 EOL"
    date: "2026.12.02"
    action: "종료 전 1.35 이상으로 업그레이드"
    badge: "eol"

  - service: "Systems Manager"
    target: "Advanced Instances Tier, 인스턴스당 시간 요금 폐지"
    date: "2026.06.30"
    action: "하이브리드 노드 사용량 기반 과금 전환"
    badge: "eos"

  - service: "Quota Monitor on AWS"
    target: "—"
    date: "2026.12.16"
    action: "Service Quotas 콘솔의 Automatic Management가 대체"
    badge: "eos"

  - service: "AWS Elastic Beanstalk"
    target: "Amazon Linux 2023 기반 PHP 8.2 플랫폼 브랜치"
    date: "2027.03.31"
    action: "EOL"
    badge: "eol"

  - service: "ACM — Certificate Transparency(CT)"
    target: "—"
    date: "2026.06.15"
    action: "CT 로깅 요구 변경"
    badge: "eos"

  - service: "ELB — ALB ConsumedLCUs 지표 보고 방식 변경"
    target: "—"
    date: "2026.06.08 ~ 06.29"
    action: "리전별 점진 배포 후 전 리전 롤아웃, 실제 전체 LCU 소비량 표시"
    badge: "eos"

# ─────────────────────────────────────────────────────────────
# NEW  (badge 자유 지정: GA, PREVIEW 등)
#   - 단일 항목: body + url
#   - 묶음 항목: items[] (subtitle/date/body/url)
# ─────────────────────────────────────────────────────────────
whats_new:
  - title: "Amazon Bedrock"
    badge: "GA"
    date: "2026.06.01"
    body: >
      OpenAI GPT-5.5 · GPT-5.4 · Codex 프로덕션 워크로드 사용 가능.
      기존 AWS 보안 · 거버넌스 · 운영 제어를 그대로 적용.
    url: "https://aws.amazon.com/ko/about-aws/whats-new/2026/06/amazon-bedrock-openai-models-codex-generally-available/"

  - title: "AgentCore 관리형 하네스"
    date: "2026.06.17"
    body: >
      오케스트레이션 루프 · 도구 실행 · 상태 유지 · 장애 복구를 코드 없이 구성만으로 처리.
      세션 중간 모델 전환 및 코드 내보내기 지원.
    url: "https://aws.amazon.com/ko/about-aws/whats-new/2026/06/openai-gpt-us-east-virginia-amazon/"

  - title: "Amazon EKS — Kubernetes 1.36 지원"
    date: "2026.06.02"
    body: >
      User Namespaces GA 및 재시작 없는 In-Place Vertical Scaling 포함.
    url: "https://aws.amazon.com/ko/about-aws/whats-new/2026/06/amazon-eks-distro-kubernetes-version-1-36"

  - title: "Amazon EC2"
    badge: "GA"
    note: "서울 리전 미출시"
    subitems:
      - subtitle: "G7 인스턴스 GA"
        date: "2026.06.18"
        body: >
          차세대 GPU 인스턴스. 그래픽 집약 워크로드 · ML 추론에서 이전 세대 대비 성능 · 가격 효율 향상.
          미디어 · AI 워크로드 적합. 미국 동부(오하이오), 미국 서부(오리건) 리전.
        url: "https://aws.amazon.com/ko/about-aws/whats-new/2026/06/amazon-ec2-g7-generally-available"
      - subtitle: "M9g / M9gd 범용 인스턴스 GA"
        date: "2026.06.10"
        body: >
          최신 Graviton 기반. 동급 x86 대비 가격 대비 성능 개선.
          미국 동부(버지니아 북부, 오하이오), 미국 서부(오리건), EU(프랑크푸르트) 리전.
        url: "https://aws.amazon.com/ko/about-aws/whats-new/2026/06/ec2-m9g-m9gd-instances-graviton5-processors-available"

  - title: "Amazon Aurora, RDS for MySQL"
    subitems:
      - subtitle: "MySQL 5.7 확장 지원 2029년 6월까지 연장"
        date: "2029.06.17"
        body: >
          중요 보안 패치와 버그 수정을 받으면서 가격 인상 없이 3년차 요금이 유지.
        url: "https://aws.amazon.com/about-aws/whats-new/2026/06/rds-mysql-es-extension/"
      - subtitle: "Amazon Aurora PostgreSQL 메이저 버전 18 지원"
        date: "2026.06.11"
        body: >
          B-tree skip scan 쿼리 성능 향상. 메이저 업그레이드 후 옵티마이저 통계 유지.
          Blue/Green · in-place · 스냅샷 복원 적용.
        url: "https://aws.amazon.com/ko/about-aws/whats-new/2026/06/amazon-aurora-postgresql-major-version-18/"
